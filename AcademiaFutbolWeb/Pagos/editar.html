<!doctype html>
<html lang="en">

<head>
    <title>Editar Pago</title>
    <link rel="stylesheet" href="../css/style.css" />
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
</head>

<body>

    <main class="container">
        <h1>Editar Pago</h1>

        <form id="form">
            <input type="number" id="jugador_id" class="form-control mb-3">
            <input type="number" id="monto" step="0.01" class="form-control mb-3">
            <input type="date" id="fecha_pago" class="form-control mb-3">
            <input type="text" id="metodo" class="form-control mb-3">
            <select id="estado" class="form-control mb-3">
                <option value="Pendiente">Pendiente</option>
                <option value="Completado">Completado</option>
                <option value="Rechazado">Rechazado</option>
            </select>

            <button class="btn btn-primary">Actualizar</button>
            <a href="index.html" class="btn btn-secondary">Volver</a>
        </form>
    </main>

    <script>
        const API = "http://localhost:3000/proyecto/pagos/";
        const id = new URLSearchParams(window.location.search).get("id");

        $.get(API + id, d => {
            $("#jugador_id").val(d.jugador_id);
            $("#monto").val(d.monto);
            $("#fecha_pago").val(d.fecha_pago);
            $("#metodo").val(d.metodo);
            $("#estado").val(d.estado);
        });

        $("#form").submit(e => {
            e.preventDefault();

            $.ajax({
                url: API + id,
                type: "PUT",
                contentType: "application/json",
                data: JSON.stringify({
                    jugador_id: Number($("#jugador_id").val()),
                    monto: Number($("#monto").val()),
                    fecha_pago: $("#fecha_pago").val(),
                    metodo: $("#metodo").val(),
                    estado: $("#estado").val()
                }),
                success: () => {
                    alert("Actualizado correctamente");
                    location.href = "index.html";
                }
            });
        });
    </script>

</body>

</html>
