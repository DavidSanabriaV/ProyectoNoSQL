<!doctype html>
<html lang="en">

<head>
    <title>Crear Categoría</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="../css/style.css" />
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
</head>

<body>
    <main class="container mt-4">
        <h1>Ingresar Categoría</h1>

        <form id="formularioCategoria">
            <div class="mb-3">
                <label class="form-label">Nombre Categoría</label>
                <input type="text" class="form-control" id="nombre_categoria" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Rango Edad</label>
                <input type="text" class="form-control" id="rango_edad" placeholder="Ej: 11-13" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Año Competencia</label>
                <input type="number" class="form-control" id="anio_competencia" required>
            </div>
            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary">Guardar</button>
                <button type="reset" class="btn btn-danger">Reset</button>
                <a href="index.html" class="btn btn-secondary">Volver</a>
            </div>
        </form>
    </main>

    <script>
        $(document).ready(function () {
            $("#formularioCategoria").submit(function (e) {
                e.preventDefault();

                $.ajax({
                    type: "POST",
                    url: "http://localhost:3000/proyecto/categorias",
                    data: JSON.stringify({
                        nombre_categoria: $("#nombre_categoria").val(),
                        rango_edad: $("#rango_edad").val(),
                        anio_competencia: Number($("#anio_competencia").val())
                    }),
                    contentType: "application/json",
                    dataType: "json",
                    success: function () {
                        alert("Categoría guardada correctamente");
                        $("#formularioCategoria")[0].reset();
                    },
                    error: function () {
                        alert("Error al guardar los datos");
                    }
                });
            });
        });
    </script>
</body>

</html>
