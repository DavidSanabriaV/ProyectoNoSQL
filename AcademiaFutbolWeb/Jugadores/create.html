<!doctype html>
<html lang="en">

<head>
    <title>Crear Jugador</title>
    <link rel="stylesheet" href="../css/style.css" />
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
</head>

<body>

    <main class="container">
        <h1>Nuevo Jugador</h1>

        <form id="form">
            <input type="text" id="nombre" placeholder="Nombre" required class="form-control mb-3">
            <input type="number" id="edad" placeholder="Edad" required class="form-control mb-3">
            <input type="text" id="posicion" placeholder="Posición" required class="form-control mb-3">
            <input type="text" id="categoria" placeholder="Categoría" required class="form-control mb-3">
            <input type="number" id="equipo_id" placeholder="Equipo ID" required class="form-control mb-3">
            <input type="text" id="estado_salud" placeholder="Estado Salud" required class="form-control mb-3">

            <button class="btn btn-primary">Guardar</button>
            <a href="index.html" class="btn btn-secondary">Volver</a>
        </form>
    </main>

    <script>
        $("#form").submit(e => {
            e.preventDefault();

            $.ajax({
                url: "http://localhost:3000/proyecto/jugadores",
                type: "POST",
                contentType: "application/json",
                data: JSON.stringify({
                    nombre: $("#nombre").val(),
                    edad: Number($("#edad").val()),
                    posicion: $("#posicion").val(),
                    categoria: $("#categoria").val(),
                    equipo_id: Number($("#equipo_id").val()),
                    estado_salud: $("#estado_salud").val()
                }),
                success: () => {
                    alert("Jugador guardado");
                    location.href = "index.html";
                }
            });
        });
    </script>

</body>

</html>
