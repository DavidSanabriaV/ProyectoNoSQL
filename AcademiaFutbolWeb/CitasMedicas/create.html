<!doctype html>
<html lang="en">

<head>
    <title>Crear Cita</title>
    <link rel="stylesheet" href="../css/style.css" />
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
</head>

<body>

    <main class="container">
        <h1>Nueva Cita Médica</h1>

        <form id="form">
            <input type="number" id="jugador_id" placeholder="Jugador ID" required class="form-control mb-3">
            <input type="date" id="fecha" required class="form-control mb-3">
            <input type="text" id="motivo" placeholder="Motivo" required class="form-control mb-3">
            <input type="text" id="doctor" placeholder="Doctor" required class="form-control mb-3">
            <input type="text" id="resultado" placeholder="Resultado" required class="form-control mb-3">

            <button class="btn btn-primary">Guardar</button>
        </form>
    </main>

    <script>
        $("#form").submit(e => {
            e.preventDefault();
            $.ajax({
                url: "http://localhost:3000/proyecto/citasMedicas",
                type: "POST",
                contentType: "application/json",
                data: JSON.stringify({
                    jugador_id: Number($("#jugador_id").val()),
                    fecha: $("#fecha").val(),
                    motivo: $("#motivo").val(),
                    doctor: $("#doctor").val(),
                    resultado: $("#resultado").val()
                }),
                success: () => { alert("Guardado"); location.href = "index.html"; }
            });
        });
    </script>

</body>

</html>
