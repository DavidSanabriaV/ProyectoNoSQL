<!doctype html>
<html lang="en">
<head>
    <title>Citas Médicas</title>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="../css/style.css" />
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
</head>
<body>

<main class="container">
    <h1>Lista de Citas Médicas</h1>

    <a href="create.html" class="btn btn-success mb-3">Agregar</a>

    <div class="table-responsive">
        <table class="table table-striped">
            <thead>
                <tr>
                    <th>Jugador</th>
                    <th>Fecha</th>
                    <th>Motivo</th>
                    <th>Doctor</th>
                    <th>Resultado</th>
                    <th></th>
                    <th></th>
                </tr>
            </thead>
            <tbody id="tabla"></tbody>
        </table>
    </div>
</main>

<script>
const API = "http://localhost:3000/proyecto/citasMedicas";

function cargar() {
    $.get(API, function(data) {
        $("#tabla").empty();
        data.forEach(e => {
            $("#tabla").append(`
                <tr>
                    <td>${e.jugador_id}</td>
                    <td>${e.fecha}</td>
                    <td>${e.motivo}</td>
                    <td>${e.doctor}</td>
                    <td>${e.resultado}</td>
                    <td><a href="editar.html?id=${e._id}" class="btn btn-warning btn-sm">Editar</a></td>
                    <td><button onclick="eliminar(${e._id})" class="btn btn-danger btn-sm">Eliminar</button></td>
                </tr>
            `);
        });
    });
}

function eliminar(id){
    if(confirm("¿Eliminar?")){
        $.ajax({ url: API + "/" + id, type: "DELETE", success: cargar });
    }
}

cargar();
</script>

</body>
</html>
