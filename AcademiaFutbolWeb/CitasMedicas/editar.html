<!doctype html>
<html lang="en">
<head>
<title>Editar Cita</title>
<link rel="stylesheet" href="../css/style.css" />
<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
</head>
<body>

<main class="container">
<h1>Editar Cita</h1>

<form id="form">
    <input type="number" id="jugador_id" class="form-control mb-3">
    <input type="date" id="fecha" class="form-control mb-3">
    <input type="text" id="motivo" class="form-control mb-3">
    <input type="text" id="doctor" class="form-control mb-3">
    <input type="text" id="resultado" class="form-control mb-3">

    <button class="btn btn-primary">Actualizar</button>
</form>
</main>

<script>
const API="http://localhost:3000/proyecto/citasMedicas/";
const id=new URLSearchParams(window.location.search).get("id");

$.get(API+id, d=>{
    $("#jugador_id").val(d.jugador_id);
    $("#fecha").val(d.fecha);
    $("#motivo").val(d.motivo);
    $("#doctor").val(d.doctor);
    $("#resultado").val(d.resultado);
});

$("#form").submit(e=>{
    e.preventDefault();
    $.ajax({
        url:API+id,
        type:"PUT",
        contentType:"application/json",
        data: JSON.stringify({
            jugador_id:Number($("#jugador_id").val()),
            fecha:$("#fecha").val(),
            motivo:$("#motivo").val(),
            doctor:$("#doctor").val(),
            resultado:$("#resultado").val()
        }),
        success:()=>{ alert("Actualizado"); location.href="index.html";}
    });
});
</script>

</body>
</html>
