<!doctype html>
<html lang="en">

<head>
    <title>Editar Partido</title>
    <link rel="stylesheet" href="../css/style.css" />
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
</head>

<body>

    <main class="container">
        <h1>Editar Partido</h1>

        <form id="form">
            <input type="number" id="equipo_local" class="form-control mb-3">
            <input type="number" id="equipo_visitante" class="form-control mb-3">
            <input type="date" id="fecha" class="form-control mb-3">
            <input type="text" id="marcador" class="form-control mb-3">
            <input type="text" id="estadio" class="form-control mb-3">

            <button class="btn btn-primary">Actualizar</button>
            <a href="index.html" class="btn btn-secondary">Volver</a>
        </form>
    </main>

    <script>
        const API = "http://localhost:3000/proyecto/partidos/";
        const id = new URLSearchParams(window.location.search).get("id");

        $.get(API + id, d => {
            $("#equipo_local").val(d.equipo_local);
            $("#equipo_visitante").val(d.equipo_visitante);
            $("#fecha").val(d.fecha);
            $("#marcador").val(d.marcador);
            $("#estadio").val(d.estadio);
        });

        $("#form").submit(e => {
            e.preventDefault();

            $.ajax({
                url: API + id,
                type: "PUT",
                contentType: "application/json",
                data: JSON.stringify({
                    equipo_local: Number($("#equipo_local").val()),
                    equipo_visitante: Number($("#equipo_visitante").val()),
                    fecha: $("#fecha").val(),
                    marcador: $("#marcador").val(),
                    estadio: $("#estadio").val()
                }),
                success: () => {
                    alert("Actualizado correctamente");
                    location.href = "index.html";
                }
            });
        });
    </script>

</body>

</html>
