<!doctype html>
<html lang="en">
<head>
<title>Editar Entrenador</title>
<link rel="stylesheet" href="../css/style.css" />
<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
</head>
<body>

<main class="container">
<h1>Editar Entrenador</h1>

<form id="form">
    <input type="text" id="nombre" class="form-control mb-3">
    <input type="text" id="especialidad" class="form-control mb-3">
    <input type="number" id="experiencia" class="form-control mb-3">
    <input type="text" id="telefono" class="form-control mb-3">
    <input type="email" id="correo" class="form-control mb-3">

    <button class="btn btn-primary">Actualizar</button>
    <a href="index.html" class="btn btn-secondary">Volver</a>
</form>
</main>

<script>
const API="http://localhost:3000/proyecto/entrenadores/";
const id=new URLSearchParams(window.location.search).get("id");

$.get(API+id, d=>{
    $("#nombre").val(d.nombre);
    $("#especialidad").val(d.especialidad);
    $("#experiencia").val(d.experiencia);
    $("#telefono").val(d.telefono);
    $("#correo").val(d.correo);
});

$("#form").submit(e=>{
    e.preventDefault();

    $.ajax({
        url:API+id,
        type:"PUT",
        contentType:"application/json",
        data: JSON.stringify({
            nombre:$("#nombre").val(),
            especialidad:$("#especialidad").val(),
            experiencia:Number($("#experiencia").val()),
            telefono:$("#telefono").val(),
            correo:$("#correo").val()
        }),
        success:()=>{
            alert("Actualizado correctamente");
            location.href="index.html";
        }
    });
});
</script>

</body>
</html>
