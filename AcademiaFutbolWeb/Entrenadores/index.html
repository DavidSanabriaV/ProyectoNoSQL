<!doctype html>
<html lang="en">
<head>
<title>Entrenadores</title>
<link rel="stylesheet" href="../css/style.css" />
<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
</head>
<body>

<main class="container">
<h1>Lista de Entrenadores</h1>

<a href="create.html" class="btn btn-success mb-3">Agregar</a>

<table class="table table-striped">
<thead>
<tr>
<th>Nombre</th><th>Especialidad</th><th>Experiencia</th><th>Teléfono</th><th>Correo</th><th></th><th></th>
</tr>
</thead>
<tbody id="tabla"></tbody>
</table>
</main>

<script>
const API="http://localhost:3000/proyecto/entrenadores";

function cargar(){
    $.get(API, data=>{
        $("#tabla").empty();
        data.forEach(e=>{
            $("#tabla").append(`
                <tr>
                <td>${e.nombre}</td>
                <td>${e.especialidad}</td>
                <td>${e.experiencia}</td>
                <td>${e.telefono}</td>
                <td>${e.correo}</td>
                <td><a href="editar.html?id=${e._id}" class="btn btn-warning btn-sm">Editar</a></td>
                <td><button onclick="eliminar(${e._id})" class="btn btn-danger btn-sm">Eliminar</button></td>
                </tr>
            `);
        });
    });
}

function eliminar(id){
    if(confirm("¿Eliminar?")){
        $.ajax({url:API+"/"+id,type:"DELETE",success:cargar});
    }
}

cargar();
</script>

</body>
</html>
