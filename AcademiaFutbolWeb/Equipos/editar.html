<!doctype html>
<html lang="en">

<head>
    <title>Editar Equipo</title>
    <link rel="stylesheet" href="../css/style.css" />
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
</head>

<body>

    <main class="container">
        <h1>Editar Equipo</h1>

        <form id="form">
            <input type="text" id="nombre_equipo" class="form-control mb-3">
            <input type="text" id="categoria" class="form-control mb-3">
            <input type="number" id="entrenador_id" class="form-control mb-3">
            <input type="text" id="lista_jugadores" class="form-control mb-3">
            <input type="number" id="puntos" class="form-control mb-3">

            <button class="btn btn-primary">Actualizar</button>
            <a href="index.html" class="btn btn-secondary">Volver</a>
        </form>
    </main>

    <script>
        const API = "http://localhost:3000/proyecto/equipos/";
        const id = new URLSearchParams(window.location.search).get("id");

        $.get(API + id, d => {
            $("#nombre_equipo").val(d.nombre_equipo);
            $("#categoria").val(d.categoria);
            $("#entrenador_id").val(d.entrenador_id);
            $("#lista_jugadores").val(d.lista_jugadores.join(","));
            $("#puntos").val(d.puntos);
        });

        $("#form").submit(e => {
            e.preventDefault();

            const jugadores = $("#lista_jugadores").val()
                .split(",")
                .map(x => Number(x.trim()));

            $.ajax({
                url: API + id,
                type: "PUT",
                contentType: "application/json",
                data: JSON.stringify({
                    nombre_equipo: $("#nombre_equipo").val(),
                    categoria: $("#categoria").val(),
                    entrenador_id: Number($("#entrenador_id").val()),
                    lista_jugadores: jugadores,
                    puntos: Number($("#puntos").val())
                }),
                success: () => {
                    alert("Actualizado correctamente");
                    location.href = "index.html";
                }
            });
        });
    </script>

</body>

</html>
