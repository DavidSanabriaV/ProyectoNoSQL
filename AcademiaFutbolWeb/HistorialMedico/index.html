<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Historial Médico — Academia Fútbol</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Nunito:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css" />
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
</head>
<body>

    <nav class="navbar">
        <a href="../index.html" class="navbar-brand">Academia Fútbol</a>
        <div class="navbar-right">
            <a href="../index.html" class="btn btn-sm" style="background: rgba(255,255,255,.15); color: #fff; border: 1px solid rgba(255,255,255,.25);">← Volver</a>
        </div>
    </nav>

    <div class="layout">
        <main class="main">
            <div class="page-header">
                <div>
                    <h1>Historial Médico</h1>
                    <p>Mantén el registro de lesiones, tratamientos y recuperaciones</p>
                </div>
            </div>

            <a href="create.html" class="btn btn-success mb-3">+ Registrar Lesión</a>

            <div class="table-responsive">
                <table class="table table-striped">
                    <thead>
                        <tr>
                            <th>Jugador ID</th>
                            <th>Tipo Lesión</th>
                            <th>Fecha Inicio</th>
                            <th>Fecha Fin</th>
                            <th>Tratamiento</th>
                            <th>Médico</th>
                            <th></th>
                            <th></th>
                        </tr>
                    </thead>
                    <tbody id="tabla"></tbody>
                </table>
            </div>
        </main>
    </div>

<footer>
    Academia de Fútbol &nbsp;&mdash;&nbsp; Formación integral de jugadores &nbsp;&mdash;&nbsp; © 2026 Todos los derechos
    reservados
</footer>

    <script>
        const API = "http://localhost:3000/proyecto/historialMedico";

        function cargar() {
            $.get(API, data => {
                $("#tabla").empty();
                data.forEach(e => {
                    $("#tabla").append(`
                <tr>
                <td>${e.jugador_id}</td>
                <td>${e.tipo_lesion}</td>
                <td>${e.fecha_inicio || '-'}</td>
                <td>${e.fecha_fin || '-'}</td>
                <td>${e.tratamiento}</td>
                <td>${e.medico}</td>
                <td><a href="editar.html?id=${e._id}" class="btn btn-warning btn-sm">Editar</a></td>
                <td><button onclick="eliminar('${e._id}')" class="btn btn-danger btn-sm">Eliminar</button></td>
                </tr>
            `);
                });
            });
        }

        function eliminar(id) {
            if (confirm("¿Confirmar eliminación?")) {
                $.ajax({ url: API + "/" + id, type: "DELETE", success: cargar });
            }
        }

        cargar();
    </script>

</body>
</html>
