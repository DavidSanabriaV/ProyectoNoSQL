<!doctype html>
<html lang="en">

<head>
    <title>Crear Historial Médico</title>
    <link rel="stylesheet" href="../css/style.css" />
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
</head>

<body>

    <main class="container">
        <h1>Nuevo Historial Médico</h1>

        <form id="form">
            <input type="number" id="jugador_id" placeholder="Jugador ID" required class="form-control mb-3">
            <input type="text" id="tipo_lesion" placeholder="Tipo Lesión" required class="form-control mb-3">
            <input type="date" id="fecha_inicio" placeholder="Fecha Inicio" class="form-control mb-3">
            <input type="date" id="fecha_fin" placeholder="Fecha Fin" class="form-control mb-3">
            <input type="text" id="tratamiento" placeholder="Tratamiento" required class="form-control mb-3">
            <input type="text" id="medico" placeholder="Médico" required class="form-control mb-3">

            <button class="btn btn-primary">Guardar</button>
            <a href="index.html" class="btn btn-secondary">Volver</a>
        </form>
    </main>

    <script>
        $("#form").submit(e => {
            e.preventDefault();

            $.ajax({
                url: "http://localhost:3000/proyecto/historialMedico",
                type: "POST",
                contentType: "application/json",
                data: JSON.stringify({
                    jugador_id: Number($("#jugador_id").val()),
                    tipo_lesion: $("#tipo_lesion").val(),
                    fecha_inicio: $("#fecha_inicio").val() || null,
                    fecha_fin: $("#fecha_fin").val() || null,
                    tratamiento: $("#tratamiento").val(),
                    medico: $("#medico").val()
                }),
                success: () => {
                    alert("Historial médico guardado");
                    location.href = "index.html";
                }
            });
        });
    </script>

</body>

</html>
