<!doctype html>
<html lang="en">
<head>
    <title>Editar Beca</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
</head>
<body>
    <main class="container mt-4">
        <h1>Editar Beca</h1>

        <form id="formularioEditar">
            <div class="mb-3">
                <label class="form-label">Jugador ID</label>
                <input type="number" class="form-control" id="jugador_id" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Tipo Beca</label>
                <select class="form-control" id="tipo_beca" required>
                    <option value="Completa">Completa</option>
                    <option value="Parcial">Parcial</option>
                    <option value="Ninguna">Ninguna</option>
                </select>
            </div>
            <div class="mb-3">
                <label class="form-label">Porcentaje</label>
                <input type="number" class="form-control" id="porcentaje" min="0" max="100" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Fecha Inicio</label>
                <input type="date" class="form-control" id="fecha_inicio" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Fecha Fin</label>
                <input type="date" class="form-control" id="fecha_fin" required>
            </div>
            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary">Actualizar</button>
                <a href="index.html" class="btn btn-secondary">Volver</a>
            </div>
        </form>
    </main>

    <script>
        $(document).ready(function () {

            const API = "http://localhost:3000/proyecto/becas/";
            const id = new URLSearchParams(window.location.search).get("id");

            $.get(API + id, function (data) {
                $("#jugador_id").val(data.jugador_id);
                $("#tipo_beca").val(data.tipo_beca);
                $("#porcentaje").val(data.porcentaje);
                $("#fecha_inicio").val(data.fecha_inicio);
                $("#fecha_fin").val(data.fecha_fin);
            }).fail(function () {
                alert("Error al cargar datos");
            });

            $("#formularioEditar").submit(function (e) {
                e.preventDefault();

                $.ajax({
                    type: "PUT",
                    url: API + id,
                    data: JSON.stringify({
                        jugador_id: Number($("#jugador_id").val()),
                        tipo_beca: $("#tipo_beca").val(),
                        porcentaje: Number($("#porcentaje").val()),
                        fecha_inicio: $("#fecha_inicio").val(),
                        fecha_fin: $("#fecha_fin").val()
                    }),
                    contentType: "application/json",
                    success: function () {
                        alert("Actualizado correctamente");
                        window.location.href = "index.html";
                    },
                    error: function () {
                        alert("Error al actualizar");
                    }
                });
            });

        });
    </script>
</body>
</html>
