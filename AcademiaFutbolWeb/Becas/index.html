<!doctype html>
<html lang="en">
<head>
    <title>Lista de Becas</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
</head>
<body>
    <main class="container mt-4">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h1>Lista de Becas</h1>
            <a href="create.html" class="btn btn-success">Agregar</a>
        </div>
        <div class="table-responsive">
            <table class="table table-primary table-striped">
                <thead>
                    <tr>
                        <th>Jugador ID</th>
                        <th>Tipo Beca</th>
                        <th>Porcentaje</th>
                        <th>Fecha Inicio</th>
                        <th>Fecha Fin</th>
                        <th>Editar</th>
                        <th>Eliminar</th>
                    </tr>
                </thead>
                <tbody id="tablademuestradedatos"></tbody>
            </table>
        </div>
    </main>

    <script>
        $(document).ready(function () {

            const API = "http://localhost:3000/proyecto/becas";

            listardatos();

            function listardatos() {
                $.ajax({
                    type: "GET",
                    url: API,
                    dataType: "json",
                    success: function (response) {
                        cargadatos(response);
                    },
                    error: function () {
                        alert("Error al cargar los datos");
                    }
                });
            }

            function cargadatos(data) {
                const $tabla = $("#tablademuestradedatos");
                $tabla.empty();

                data.forEach((elemento) => {
                    let fila = `<tr>
                        <td>${elemento.jugador_id}</td>
                        <td>${elemento.tipo_beca}</td>
                        <td>${elemento.porcentaje}%</td>
                        <td>${elemento.fecha_inicio}</td>
                        <td>${elemento.fecha_fin}</td>
                        <td><a href="editar.html?id=${elemento._id}" class="btn btn-warning btn-sm">Editar</a></td>
                        <td><button class="btn btn-danger btn-sm btn-eliminar" data-id="${elemento._id}">Eliminar</button></td>
                    </tr>`;
                    $tabla.append(fila);
                });
            }

            $(document).on("click", ".btn-eliminar", function () {
                let id = $(this).data("id");
                if (confirm("¿Seguro que deseas eliminar este registro?")) {
                    $.ajax({
                        type: "DELETE",
                        url: API + "/" + id,
                        success: function () {
                            alert("Eliminado correctamente");
                            listardatos();
                        },
                        error: function () {
                            alert("Error al eliminar");
                        }
                    });
                }
            });

        });
    </script>
</body>
</html>
