<!doctype html>
<html lang="en">

<head>
    <title>Crear Premio</title>
    <link rel="stylesheet" href="../css/style.css" />
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
</head>

<body>

    <main class="container">
        <h1>Nuevo Premio</h1>

        <form id="form">
            <input type="number" id="jugador_id" placeholder="Jugador ID" required class="form-control mb-3">
            <input type="number" id="torneo_id" placeholder="Torneo ID" required class="form-control mb-3">
            <input type="text" id="tipo_premio" placeholder="Tipo Premio" required class="form-control mb-3">
            <input type="date" id="fecha" placeholder="Fecha" required class="form-control mb-3">

            <button class="btn btn-primary">Guardar</button>
            <a href="index.html" class="btn btn-secondary">Volver</a>
        </form>
    </main>

    <script>
        $("#form").submit(e => {
            e.preventDefault();

            $.ajax({
                url: "http://localhost:3000/proyecto/premios",
                type: "POST",
                contentType: "application/json",
                data: JSON.stringify({
                    jugador_id: Number($("#jugador_id").val()),
                    torneo_id: Number($("#torneo_id").val()),
                    tipo_premio: $("#tipo_premio").val(),
                    fecha: $("#fecha").val()
                }),
                success: () => {
                    alert("Premio guardado");
                    location.href = "index.html";
                }
            });
        });
    </script>

</body>

</html>
