<!doctype html>
<html lang="en">

<head>
    <title>Editar Premio</title>
    <link rel="stylesheet" href="../css/style.css" />
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
</head>

<body>

    <main class="container">
        <h1>Editar Premio</h1>

        <form id="form">
            <input type="number" id="jugador_id" class="form-control mb-3">
            <input type="number" id="torneo_id" class="form-control mb-3">
            <input type="text" id="tipo_premio" class="form-control mb-3">
            <input type="date" id="fecha" class="form-control mb-3">

            <button class="btn btn-primary">Actualizar</button>
            <a href="index.html" class="btn btn-secondary">Volver</a>
        </form>
    </main>

    <script>
        const API = "http://localhost:3000/proyecto/premios/";
        const id = new URLSearchParams(window.location.search).get("id");

        $.get(API + id, d => {
            $("#jugador_id").val(d.jugador_id);
            $("#torneo_id").val(d.torneo_id);
            $("#tipo_premio").val(d.tipo_premio);
            $("#fecha").val(d.fecha);
        });

        $("#form").submit(e => {
            e.preventDefault();

            $.ajax({
                url: API + id,
                type: "PUT",
                contentType: "application/json",
                data: JSON.stringify({
                    jugador_id: Number($("#jugador_id").val()),
                    torneo_id: Number($("#torneo_id").val()),
                    tipo_premio: $("#tipo_premio").val(),
                    fecha: $("#fecha").val()
                }),
                success: () => {
                    alert("Actualizado correctamente");
                    location.href = "index.html";
                }
            });
        });
    </script>

</body>

</html>
