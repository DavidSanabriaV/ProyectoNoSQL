<!doctype html>
<html lang="en">

<head>
    <title>Crear</title>
    <!-- Required meta tags -->
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />

    <!-- Bootstrap CSS v5.2.1 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous" />
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
</head>

<body>
    <main>
        <h1>Ingresar asistencia</h1>

        <form id="formularioAsistencia">

            <div class="mb-3">
                <label class="form-label">Jugador ID</label>
                <input type="number" class="form-control" id="jugador_id" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Fecha</label>
                <input type="date" class="form-control" id="fecha" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Estado</label>
                <select class="form-control" id="estado" required>
                    <option value="Presente">Presente</option>
                    <option value="Ausente">Ausente</option>
                    <option value="Justificado">Justificado</option>
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label">Observaciones</label>
                <input type="text" class="form-control" id="observaciones">
            </div>

            <div class="mt-3">
                <button type="submit" class="btn btn-primary">Guardar</button>
                <button type="reset" class="btn btn-danger">Reset</button>
                <a href="index.html" class="btn btn-secondary">Volver</a>
            </div>
        </form>
    </main>
    <footer>
        <!-- place footer here -->
    </footer>
    <!-- Bootstrap JavaScript Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"
        integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r"
        crossorigin="anonymous"></script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.min.js"
        integrity="sha384-BBtl+eGJRgqQAUMxJ7pMwbEyER4l1g+O15P+16Ep7Q9Q+zqX6gSbd85u4mG4QzX+"
        crossorigin="anonymous"></script>

    <script>
        $(document).ready(function () {
            $("#formularioAsistencia").submit(function (e) {
                e.preventDefault();

                let datos = {
                    jugador_id: $("#jugador_id").val(),
                    fecha: $("#fecha").val(),
                    estado: $("#estado").val(),
                    observaciones: $("#observaciones").val()
                };

                console.log(datos);

                $.ajax({
                    type: "POST",
                    url: "http://localhost:3000/proyecto/asistencia",
                    data: JSON.stringify(datos),
                    contentType: "application/json",
                    dataType: "json",
                    success: function (response) {
                        console.log(response);
                        alert("Datos guardados correctamente");

                        // limpiar formulario
                        $("#formularioAsistencia")[0].reset();
                    },
                    error: function (error) {
                        console.error(error);
                        alert("Error al guardar los datos");
                    }
                });
            });
        });
    </script>
</body>

</html>
