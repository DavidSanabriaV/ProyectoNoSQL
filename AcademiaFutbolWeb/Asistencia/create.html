<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrar Asistencia — Academia Fútbol</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Nunito:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css" />
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
</head>
<body>

    <nav class="navbar">
        <a href="../index.html" class="navbar-brand">Academia Fútbol</a>
        <div class="navbar-right">
            <a href="../index.html" class="btn btn-sm" style="background: rgba(255,255,255,.15); color: #fff; border: 1px solid rgba(255,255,255,.25);">← Volver</a>
        </div>
    </nav>

    <main class="container mt-4">
        <h1>Registrar Asistencia</h1>

        <form id="formularioAsistencia">
            <div class="mb-3">
                <label class="form-label">Jugador ID</label>
                <input type="number" class="form-control" id="jugador_id" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Fecha</label>
                <input type="date" class="form-control" id="fecha" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Estado</label>
                <select class="form-control" id="estado" required>
                    <option value="Presente">Presente</option>
                    <option value="Ausente">Ausente</option>
                    <option value="Justificado">Justificado</option>
                </select>
            </div>
            <div class="mb-3">
                <label class="form-label">Observaciones</label>
                <input type="text" class="form-control" id="observaciones">
            </div>
            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary">Guardar</button>
                <button type="reset" class="btn btn-danger">Reset</button>
                <a href="index.html" class="btn btn-secondary">Volver</a>
            </div>
        </form>
    </main>

    <script>
        $(document).ready(function () {
            $("#formularioAsistencia").submit(function (e) {
                e.preventDefault();

                $.ajax({
                    type: "POST",
                    url: "http://localhost:3000/proyecto/asistencia",
                    data: JSON.stringify({
                        jugador_id: $("#jugador_id").val(),
                        fecha: $("#fecha").val(),
                        estado: $("#estado").val(),
                        observaciones: $("#observaciones").val()
                    }),
                    contentType: "application/json",
                    dataType: "json",
                    success: function () {
                        alert("Datos guardados correctamente");
                        window.location.href = "index.html";
                    },
                    error: function () {
                        alert("Error al guardar los datos");
                    }
                });
            });
        });
    </script>

</body>
</html>
