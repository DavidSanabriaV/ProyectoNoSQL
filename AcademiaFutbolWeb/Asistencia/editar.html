<!doctype html>
<html lang="en">

<head>
    <title>Editar Asistencia</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
</head>

<body>

    <main class="container mt-4">
        <h1>Editar Asistencia</h1>

        <form id="formularioEditar">
            <div class="mb-3">
                <label class="form-label">Jugador ID</label>
                <input type="number" class="form-control" id="jugador_id" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Fecha</label>
                <input type="date" class="form-control" id="fecha" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Estado</label>
                <select class="form-control" id="estado" required>
                    <option value="Presente">Presente</option>
                    <option value="Ausente">Ausente</option>
                    <option value="Justificado">Justificado</option>
                </select>
            </div>
            <div class="mb-3">
                <label class="form-label">Observaciones</label>
                <input type="text" class="form-control" id="observaciones">
            </div>
            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary">Actualizar</button>
                <a href="index.html" class="btn btn-secondary">Volver</a>
            </div>
        </form>
    </main>

    <script>
        $(document).ready(function () {

            const API = "http://localhost:3000/proyecto/asistencia/";
            const id = new URLSearchParams(window.location.search).get("id");

            $.get(API + id, function (data) {
                $("#jugador_id").val(data.jugador_id);
                $("#fecha").val(data.fecha);
                $("#estado").val(data.estado);
                $("#observaciones").val(data.observaciones);
            }).fail(function () {
                alert("Error al cargar datos");
            });

            $("#formularioEditar").submit(function (e) {
                e.preventDefault();

                $.ajax({
                    type: "PUT",
                    url: API + id,
                    data: JSON.stringify({
                        jugador_id: Number($("#jugador_id").val()),
                        fecha: $("#fecha").val(),
                        estado: $("#estado").val(),
                        observaciones: $("#observaciones").val()
                    }),
                    contentType: "application/json",
                    success: function () {
                        alert("Actualizado correctamente");
                        window.location.href = "index.html";
                    },
                    error: function () {
                        alert("Error al actualizar");
                    }
                });
            });

        });
    </script>

</body>
</html>
